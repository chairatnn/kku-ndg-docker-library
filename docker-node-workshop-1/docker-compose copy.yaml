services:

  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kku_library
      POSTGRES_USER: kku
      POSTGRES_PASSWORD: kku_password
    ports:
      - "5433:5432"
    volumes:
      - kku_database:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kku -d kku_library"]
      interval: 5s
      timeout: 5s
      retries: 30

volumes:
  kku_database:
